name: Build and Release

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) Code auschecken
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Node-Version festlegen
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # NPM Cache für bessere Performance

      # 3) Dependencies installieren
      - name: Install dependencies
        run: npm ci

      # 4) Vite Build
      - name: Build & Test
        run: |
          npm run build
          npm run preview &  # Preview im Hintergrund starten
          sleep 5  # Kurz warten
          curl -f http://localhost:4173 || exit 1  # Smoke test
          pkill -f "vite preview"  # Preview wieder stoppen

      # 5) Semantic Release ausführen
      - name: Semantic Release
        id: semantic_release
        run: |
          npx semantic-release --debug > sr.log 2>&1 || true
          
          # Version aus semantic-release extrahieren
          if grep -q "Published release" sr.log; then
            VERSION=$(grep "Published release" sr.log | sed -n 's/.*Published release \([0-9.]*\).*/\1/p')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "New release version: $VERSION"
          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "No new release created"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6) Docker Setup (nur bei neuem Release)
      - name: Set up Docker Buildx
        if: ${{ steps.semantic_release.outputs.version != '' }}
        uses: docker/setup-buildx-action@v3

      # 7) Docker-Login (nur bei neuem Release)
      - name: Log in to Docker registry
        if: ${{ steps.semantic_release.outputs.version != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8) Build und Push Docker Image
      - name: Build and push Docker image
        if: ${{ steps.semantic_release.outputs.version != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # Multi-platform
          push: true
          tags: |
            docker.io/darthkali/perfect-tour:${{ steps.semantic_release.outputs.version }}
            docker.io/darthkali/perfect-tour:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 9) Deployment-Benachrichtigung (optional)
      - name: Deployment notification
        if: ${{ steps.semantic_release.outputs.version != '' }}
        run: |
          echo "🚀 Perfect Tour v${{ steps.semantic_release.outputs.version }} erfolgreich deployed!"
          echo "Docker Image: docker.io/darthkali/perfect-tour:${{ steps.semantic_release.outputs.version }}"
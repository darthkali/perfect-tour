name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) Code auschecken
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Node-Version festlegen
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'  # NPM Cache für bessere Performance

      # 3) Dependencies installieren
      - name: Install dependencies
        run: npm ci

      # 4) Vite Build
      - name: Build & Test
        run: |
          npm run build
          npm run preview &  # Preview im Hintergrund starten
          sleep 5  # Kurz warten
          curl -f http://localhost:4173 || exit 1  # Smoke test
          pkill -f "vite preview"  # Preview wieder stoppen

      # 5) Semantic Release ausführen
      #
      #    - Wir lassen Semantic Release laufen und leiten die Ausgabe in eine Log-Datei um.
      #    - Anschließend suchen wir in diesem Log nach der Version und geben sie als Output aus.
      #    - Wenn keine neue Version veröffentlicht wird, bricht Semantic Release mit Code 0 ab,
      #      wir setzen dann "version" leer und überspringen das Docker-Build später.
      # > sr.log 2>&1 || true
      - name: Semantic Release
        id: semantic_release
        run: |
          # Führe semantic-release aus und speichere die Log-Ausgabe
          npx semantic-release --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Im nächsten Schritt die Variable verwenden
      - name: Check semantic-release version
        id: check_version
        run: |
          echo "SEMANTIC_RELEASE_VERSION: $SEMANTIC_RELEASE_VERSION"
          if [ -z "$SEMANTIC_RELEASE_VERSION" ]; then
            echo "No new release created."
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "New release version: $SEMANTIC_RELEASE_VERSION"
            echo "version=$SEMANTIC_RELEASE_VERSION" >> $GITHUB_OUTPUT
          fi

      # 6) Docker Setup (nur bei neuem Release)
      - name: Set up Docker Buildx
        if: ${{ steps.semantic_release.outputs.version != '' }}
        uses: docker/setup-buildx-action@v3

      # 7) Docker-Login (nur bei neuem Release)
      - name: Log in to Docker registry
        if: ${{ steps.semantic_release.outputs.version != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8) Build und Push Docker Image
      - name: Build and push Docker image
        if: ${{ steps.semantic_release.outputs.version != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # Multi-platform
          push: true
          tags: |
            docker.io/darthkali/perfect-tour:${{ steps.semantic_release.outputs.version }}
            docker.io/darthkali/perfect-tour:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 9) Deployment-Benachrichtigung (optional)
      - name: Deployment notification
        if: ${{ steps.semantic_release.outputs.version != '' }}
        run: |
          echo "🚀 Perfect Tour v${{ steps.semantic_release.outputs.version }} erfolgreich deployed!"
          echo "Docker Image: docker.io/darthkali/perfect-tour:${{ steps.semantic_release.outputs.version }}"